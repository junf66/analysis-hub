name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests (stdlib unittest, no network)
        run: |
          python -m unittest discover -s tests -v
      - name: Run static + cross-ref audit (audit_all)
        # data 整合性は data/kouaku_records.json があるとき限定の最終ゲート
        run: |
          python -m scripts.audit_all
